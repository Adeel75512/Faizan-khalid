<svg xmlns="http://www.w3.org/2000/svg" width="300" height="70" viewBox="0 0 300 70">
  <defs>
    <linearGradient id="royalGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFD700" />
      <stop offset="50%" stop-color="#FFFACD" />
      <stop offset="100%" stop-color="#DAA520" />
      <animate attributeName="gradientTransform" type="translate" from="-1,0" to="1,0" dur="3s" repeatCount="indefinite" />
    </linearGradient>

    <filter id="divineGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feSpecularLighting surfaceScale="5" specularConstant="1" specularExponent="20" lighting-color="#FFD700" in="blur" result="specOut">
        <fePointLight x="-50" y="-50" z="200" />
      </feSpecularLighting>
      <feComposite in="specOut" in2="SourceGraphic" operator="arithmetic" k1="0" k2="1" k3="1" k4="0" />
    </filter>
  </defs>

  <rect x="5" y="5" width="290" height="60" rx="15" fill="#000" stroke="url(#royalGrad)" stroke-width="2.5">
    <animate attributeName="stroke-width" values="2.5;4;2.5" dur="1.5s" repeatCount="indefinite" />
    <animate attributeName="stroke-opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite" />
  </rect>

  <g opacity="0.6">
    <circle r="1.5" fill="#FFD700" cx="50" cy="20">
      <animate attributeName="cx" values="50;250;50" dur="10s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.2;1;0.2" dur="3s" repeatCount="indefinite" />
    </circle>
    <circle r="1" fill="#fff" cx="250" cy="50">
      <animate attributeName="cx" values="250;50;250" dur="8s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.1;0.8;0.1" dur="2s" repeatCount="indefinite" />
    </circle>
  </g>

  <text x="150" y="44" text-anchor="middle" font-family="Verdana, Geneva, sans-serif" font-size="28" font-weight="950" fill="url(#royalGrad)" filter="url(#divineGlow)" style="letter-spacing: 3px; text-transform: uppercase;">
    MIT LICENSE
  </text>

  <path d="M150 50 L152 56 L158 56 L153 60 L155 66 L150 62 L145 66 L147 60 L142 56 L148 56 Z" fill="url(#royalGrad)" filter="url(#divineGlow)">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" repeatCount="indefinite" />
    <animateTransform attributeName="transform" type="rotate" from="0 150 58" to="360 150 58" dur="5s" repeatCount="indefinite" />
  </path>
</svg>
